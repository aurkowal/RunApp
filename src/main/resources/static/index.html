<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RunApp – mapa trasy</title>

    <!-- Leaflet -->
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Polyline decoder -->
    <script src="https://unpkg.com/@mapbox/polyline@1.1.1/src/polyline.js"></script>

    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>Mapa trasy</h2>
<div id="map"></div>


<label for="routeId">ID trasy:</label>
<input type="number" id="routeId">
<button onclick="loadRoute()">Pokaż trasę</button>

<br><br>

<label for="runnerId">ID runnera:</label>
<input type="number" id="runnerId">
<button onclick="loadRunnerRoutes()">Pokaż wszystkie trasy</button>

<script src="app.js"></script>
</body>
</html>
